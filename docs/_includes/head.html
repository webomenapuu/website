<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description" content="{{ site.description }}" />
  <meta name="author" content="Päiväkoti Omenapuu" />
  <title>{{ site.title }}</title>
  <!-- Favicon-->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ 'apple-touch-icon.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ 'favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ 'favicon-16x16.png' | relative_url }}">
  <link rel="manifest" href="{{ 'site.webmanifest' | relative_url }}">
  <link rel="mask-icon" href="{{ 'safari-pinned-tab.svg' | relative_url }}" color="#000000">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">
  <!-- Bootstrap Icons-->
  <link href="{{ 'assets/css/bootstrap-icons.css' | relative_url }}" rel="stylesheet" />
  <!-- Google fonts-->
  <link href="{{ 'assets/css/merriweather.css' | relative_url }}" rel="stylesheet" />
  <!-- Core theme CSS (includes Bootstrap)-->
  <link href="{{ 'assets/css/bootstrap.css' | relative_url }}" rel="stylesheet" />
  <link href="{{ 'assets/css/main.css' | relative_url }}" rel="stylesheet" />
</head>
