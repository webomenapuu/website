<div class="col-sm-12 col-lg-6 no-padding">
  <picture>
    <source srcset="{{ 'assets/img/' | append: include.group.imageName | append: '.webp' | relative_url }}" class="group-image" type="image/webp">
    <source srcset="{{ 'assets/img/' | append: include.group.imageName | append: '.jpg' | relative_url }}" class="group-image" type="image/jpeg">
    <img src="{{ 'assets/img/' | append: include.group.imageName | append: '.jpg' | relative_url }}" class="group-image" alt="{{ include.group.imageName }}">
  </picture>
</div>
